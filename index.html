<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>駐車場・賃貸物件マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin:0;
      padding:0;
      height:100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width:100%;
      height:100vh;
    }

    #searchBox {
      position:absolute;
      top:10px;
      right:10px;
      z-index:9999;
      background:white;
      padding:8px;
      border-radius:8px;
      box-shadow:0 1px 6px rgba(0,0,0,0.25);
      display:flex;
      gap:6px;
    }

    #searchBox input {
      width:220px;
      padding:6px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    #searchBox button {
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#0078d7;
      color:white;
      cursor:pointer;
    }

    #searchBox button:last-child {
      background:#666;
    }

    .popup-title {
      font-weight:bold;
      margin-bottom:6px;
    }

    .popup-row {
      margin-bottom:4px;
    }

    .popup-link {
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      background:#0078d7;
      color:white;
      text-decoration:none;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div id="searchBox">
  <input type="text" id="keyword" placeholder="物件名・住所で検索">
  <button onclick="searchLocation()">検索</button>
  <button onclick="resetMap()">解除</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ76snEoxeYompsWzXbGi-bdBG6Q5ZLT7lQjq1uMscKSbdCK_PZ8MYz8mUy3U1zrKANbdAwNWqAcSTf/pub?gid=1483465781&single=true&output=csv";

const map = L.map("map").setView([34.9897,137.0021],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const markers=[];
const allData=[];

// CSVパース（重要）
function parseCSV(text){
  const rows=[];
  let row=[],cell="",inQuotes=false;

  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];

    if(c=='"'){
      if(inQuotes&&n=='"'){cell+='"';i++;}
      else{inQuotes=!inQuotes;}
    }else if(c==","&&!inQuotes){
      row.push(cell);cell="";
    }else if((c=="\n"||c=="\r")&&!inQuotes){
      if(c=="\r"&&n=="\n")i++;
      row.push(cell);rows.push(row);
      row=[];cell="";
    }else{
      cell+=c;
    }
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}

function toObjects(rows){
  const h=rows[0];
  return rows.slice(1).map(r=>{
    const o={};
    h.forEach((k,i)=>o[k]=r[i]);
    return o;
  });
}

function num(v){
  return parseFloat(String(v||"").replace(/,/g,""));
}

function hasValue(v){
  return String(v||"").trim()!=="";
}

function getColor(status){
  if(status?.includes("空")) return "#16a34a";
  if(status?.includes("予定")) return "#f59e0b";
  if(status?.includes("満")) return "#dc2626";
  return "#2563eb";
}

function getIcon(type){
  if(type?.includes("駐車場")) return "P";
  if(type?.includes("居住")) return "H";
  return "●";
}

// ★見た目ここ
function createIcon(color,text,price,type){
  const parking=type?.includes("駐車場");
  const show=parking&&hasValue(price);

  return L.divIcon({
    html:`
      <div style="display:flex;align-items:center;">
        <div style="
          width:32px;height:32px;border-radius:50%;
          background:${color};color:white;
          display:flex;align-items:center;justify-content:center;
          font-weight:bold;border:2px solid white;
        ">${text}</div>

        ${show?`
        <div style="
          margin-left:4px;
          background:white;color:#111;
          border-radius:12px;padding:2px 7px;
          font-size:12px;font-weight:bold;
          border:1px solid #ccc;
        ">${price}</div>`:""}
      </div>
    `,
    iconSize:[show?80:32,32],
    iconAnchor:[show?40:16,16]
  });
}

function searchLocation(){
  const k=keyword.value.toLowerCase();
  const r=allData.filter(d=>d.name.toLowerCase().includes(k)||d.address.toLowerCase().includes(k));

  if(r.length==1){
    map.setView([r[0].lat,r[0].lng],17);
    r[0].marker.openPopup();
  }else{
    map.fitBounds(L.featureGroup(r.map(x=>x.marker)).getBounds());
  }
}

function resetMap(){
  keyword.value="";
  map.fitBounds(L.featureGroup(markers).getBounds());
}

fetch(csvUrl)
.then(r=>r.text())
.then(text=>{
  const data=toObjects(parseCSV(text));

  data.forEach(item=>{

    const name=item["名称"]||"";
    const type=item["種別"]||"";
    const status=item["空き状況"]||"";
    const price=item["月額"]||"";
    const address=item["所在地"]||"";
    const note=item["備考"]||"";

    const lat=num(item["緯度"]);
    const lng=num(item["経度"]);

    if(!lat||!lng)return;

    const marker=L.marker([lat,lng],{
      icon:createIcon(getColor(status),getIcon(type),price,type)
    }).addTo(map);

    let html=`<div class="popup-title">${name}</div>`;
    if(type)html+=`<div class="popup-row">種別：${type}</div>`;
    if(status)html+=`<div class="popup-row">状況：${status}</div>`;
    if(price)html+=`<div class="popup-row">月額：${price}</div>`;
    if(address)html+=`<div class="popup-row">住所：${address}</div>`;
    if(note)html+=`<div class="popup-row">備考：${note}</div>`;

    html+=`<a class="popup-link" target="_blank" href="https://www.google.com/maps?q=${lat},${lng}&t=k">航空写真</a>`;

    marker.bindPopup(html);

    markers.push(marker);
    allData.push({name,address,lat,lng,marker});
  });

  map.fitBounds(L.featureGroup(markers).getBounds());
});

</script>

</body>
</html>
