<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>駐車場・賃貸物件マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    #searchBox {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    #searchBox input {
      width: 220px;
      padding: 6px 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #searchBox button {
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #0078d7;
      color: white;
    }

    #searchBox button:last-child {
      background: #666;
    }

    .popup-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .popup-row {
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .popup-link {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: #0078d7;
      color: #fff !important;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
    }

    .popup-link:hover {
      opacity: 0.9;
    }

    .label-text {
      background: white;
      border: 1px solid #999;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    @media (max-width: 768px) {
      #searchBox {
        left: 10px;
        right: 10px;
        top: 10px;
      }

      #searchBox input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="searchBox">
    <input type="text" id="keyword" placeholder="駐車場名・住所で検索" />
    <button onclick="searchLocation()">検索</button>
    <button onclick="resetMap()">解除</button>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // ====== ここをあなたのCSV URLにする ======
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ76snEoxeYompsWzXbGi-bdBG6Q5ZLT7lQjq1uMscKSbdCK_PZ8MYz8mUy3U1zrKANbdAwNWqAcSTf/pub?gid=1483465781&single=true&output=csv";

    // 地図初期化
    const map = L.map("map").setView([34.9897, 137.0021], 13);

    // 背景地図
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markers = [];
    const allData = [];

    // Enterキーでも検索
    document.addEventListener("DOMContentLoaded", () => {
      const keywordInput = document.getElementById("keyword");
      keywordInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          searchLocation();
        }
      });
    });

    // CSVを安全に1行ずつ配列化
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function toObjects(rows) {
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (r[i] || "").trim();
        });
        return obj;
      });
    }

    function num(val) {
      return parseFloat(String(val).replace(/,/g, "").trim());
    }

    function createGoogleMapUrl(lat, lng) {
      return `https://www.google.com/maps?q=${lat},${lng}&t=k`;
    }

    function createGoogleDirectionsUrl(lat, lng) {
      return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    }

    function getStatusColor(status) {
      const s = (status || "").trim();
      if (s.includes("空")) return "green";
      if (s.includes("予定")) return "orange";
      if (s.includes("満")) return "red";
      return "blue";
    }

    function getTypeIcon(type) {
      const t = (type || "").trim();
      if (t.includes("駐車場")) return "P";
      if (t.includes("居住") || t.includes("賃貸")) return "家";
      return "●";
    }

    function createDivIcon(color, text) {
      return L.divIcon({
        className: "",
        html: `
          <div style="
            background:${color};
            color:white;
            width:30px;
            height:30px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
            font-weight:bold;
            border:2px solid white;
            box-shadow:0 1px 4px rgba(0,0,0,0.4);
          ">${text}</div>
        `,
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -15]
      });
    }

    function searchLocation() {
      const keyword = document.getElementById("keyword").value.trim().toLowerCase();

      if (!keyword) {
        alert("検索したい駐車場名や住所を入力してください。");
        return;
      }

      const results = allData.filter(item =>
        item.name.toLowerCase().includes(keyword) ||
        item.address.toLowerCase().includes(keyword)
      );

      if (results.length === 0) {
        alert("該当データがありません。");
        return;
      }

      if (results.length === 1) {
        const item = results[0];
        map.setView([item.lat, item.lng], 17);
        item.marker.openPopup();
      } else {
        const group = L.featureGroup(results.map(r => r.marker));
        map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    function resetMap() {
      document.getElementById("keyword").value = "";
      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    fetch(csvUrl)
      .then(res => res.text())
      .then(text => {
        const rows = parseCSV(text);
        const data = toObjects(rows);

        data.forEach(item => {
          const name =
            item["名称"] ||
            item["物件名"] ||
            item["駐車場名"] ||
            item["名前"] ||
            "";

          const type =
            item["種別"] ||
            "";

          const status =
            item["空き状況"] ||
            item["状況"] ||
            "";

          const price =
            item["月額"] ||
            item["賃料"] ||
            item["料金"] ||
            "";

          const address =
            item["住所"] ||
            item["所在地"] ||
            "";

          const lat =
            num(item["緯度"] || item["lat"] || item["latitude"]);

          const lng =
            num(item["経度"] || item["lng"] || item["lon"] || item["longitude"]);

          if (!lat || !lng) return;

          const color = getStatusColor(status);
          const iconText = getTypeIcon(type);

          const marker = L.marker([lat, lng], {
            icon: createDivIcon(color, iconText)
          }).addTo(map);

          let popupHtml = `<div class="popup-title">${name || "名称未設定"}</div>`;

          if (type) {
            popupHtml += `<div class="popup-row"><strong>種別：</strong>${type}</div>`;
          }

          if (status) {
            popupHtml += `<div class="popup-row"><strong>状況：</strong>${status}</div>`;
          }

          if (price) {
            popupHtml += `<div class="popup-row"><strong>月額：</strong>${price}</div>`;
          }

          if (address) {
            popupHtml += `<div class="popup-row"><strong>住所：</strong>${address}</div>`;
          }

          popupHtml += `
            <a class="popup-link" href="${createGoogleMapUrl(lat, lng)}" target="_blank" rel="noopener noreferrer">
              航空写真で見る
            </a>
          `;

          popupHtml += `
            <br>
            <a class="popup-link" href="${createGoogleDirectionsUrl(lat, lng)}" target="_blank" rel="noopener noreferrer" style="background:#444; margin-top:6px;">
              Googleマップで開く
            </a>
          `;

          marker.bindPopup(popupHtml);

          if (name) {
            L.marker([lat, lng], {
              icon: L.divIcon({
                className: "",
                html: `<div class="label-text">${name}</div>`,
                iconSize: [120, 24],
                iconAnchor: [-10, 10]
              }),
              interactive: false
            }).addTo(map);
          }

          markers.push(marker);

          allData.push({
            name: name || "",
            address: address || "",
            lat: lat,
            lng: lng,
            marker: marker
          });
        });

        if (markers.length > 0) {
          const group = L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.2));
        }
      })
      .catch(err => {
        console.error("CSV読み込みエラー:", err);
        alert("CSVの読み込みに失敗しました。URLや公開設定を確認してください。");
      });
  </script>
</body>
</html>
