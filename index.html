<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>駐車場・賃貸物件マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body { margin:0; padding:0; height:100%; font-family:Arial; }
    #map { width:100%; height:100vh; }

    .popup-link {
      display:block;
      margin-top:6px;
      padding:6px;
      border-radius:6px;
      text-align:center;
      color:#fff !important;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const SPREADSHEET_ID = "ここにID";

const baseCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ76snEoxeYompsWzXbGi-bdBG6Q5ZLT7lQjq1uMscKSbdCK_PZ8MYz8mUy3U1zrKANbdAwNWqAcSTf/pub?gid=1483465781&single=true&output=csv";
const csvUrl = baseCsvUrl + "&t=" + Date.now();

const map = L.map("map").setView([34.9897,137.0021],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

function parseCSV(text){
  const rows=[];
  let row=[],cell="",inQuotes=false;

  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];

    if(c==='"'){
      if(inQuotes&&n==='"'){cell+='"';i++;}
      else inQuotes=!inQuotes;
    }else if(c===','&&!inQuotes){
      row.push(cell);cell="";
    }else if((c==='\n'||c==='\r')&&!inQuotes){
      row.push(cell);rows.push(row);
      row=[];cell="";
    }else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}

function toObjects(rows){
  const headers=rows[0];
  return rows.slice(1).map(r=>{
    const o={};
    headers.forEach((h,i)=>o[h]=r[i]);
    return o;
  });
}

function num(v){
  return parseFloat(String(v||"").replace(/,/g,""));
}

function formatPrice(v){
  if(!v)return "";
  return "¥"+Number(v).toLocaleString();
}

function getStatusColor(s){
  s=(s||"").trim();

  if(!s) return "#999";
  if(s.includes("空予定")) return "#f59e0b";
  if(s.includes("空")) return "#007bff";
  if(s.includes("満")) return "#dc2626";

  return "#999";
}

function getTypeIcon(t){
  if((t||"").includes("駐車場")) return "P";
  return "⌂";
}

function createIcon(color,text,price,type){
  const showPrice=(type||"").includes("駐車場")&&price;

  return L.divIcon({
    html:`
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="
        width:34px;height:34px;border-radius:50%;
        background:${color};color:#fff;
        display:flex;align-items:center;justify-content:center;
        font-weight:bold;border:2px solid #fff;">
        ${text}
      </div>
      ${showPrice?`<div style="background:#fff;padding:2px 6px;border-radius:10px;margin-top:3px;font-size:12px;">${formatPrice(price)}</div>`:""}
    </div>`,
    className:"",
    iconSize:[34,34],
    iconAnchor:[17,17]
  });
}

fetch(csvUrl)
.then(r=>r.text())
.then(text=>{
  const data=toObjects(parseCSV(text));

  data.forEach(item=>{
    const name=item["名称"]||"";
    const type=item["種別"]||"";
    const status=item["空き状況"]||"";
    const price=item["月額"]||"";
    const shortPrice=item["短期"]||"";
    const lat=num(item["緯度"]);
    const lng=num(item["経度"]);

    if(!lat||!lng)return;

    const color=getStatusColor(status);

    const marker=L.marker([lat,lng],{
      icon:createIcon(color,getTypeIcon(type),price,type)
    }).addTo(map);

    let html=`<b>${name}</b><br>`;

    if(status) html+=`状況：${status}<br>`;
    if(price) html+=`月額：${formatPrice(price)}<br>`;
    if(shortPrice) html+=`<span style="color:#000;">短期：${formatPrice(shortPrice)}</span><br>`;

    // 🔥シートジャンプ
    const url=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit#range=${encodeURIComponent(name)}!A1`;
    html+=`<a class="popup-link" style="background:#16a34a;" target="_blank" href="${url}">シートを見る</a>`;

    // 航空写真
    html+=`<a class="popup-link" style="background:#007bff;" target="_blank" href="https://www.google.com/maps?q=${lat},${lng}&t=k">航空写真で見る</a>`;

    marker.bindPopup(html);
  });
});
</script>

</body>
</html>
