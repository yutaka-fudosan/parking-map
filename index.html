<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>駐車場・賃貸物件マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const baseCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ76snEoxeYompsWzXbGi-bdBG6Q5ZLT7lQjq1uMscKSbdCK_PZ8MYz8mUy3U1zrKANbdAwNWqAcSTf/pub?gid=1483465781&single=true&output=csv";
const csvUrl = baseCsvUrl + "&t=" + Date.now(); // キャッシュ対策

const map = L.map("map").setView([34.9897,137.0021],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

function getStatusColor(status){
  if((status||"").includes("空")) return "#007bff"; // 青
  return "#999999"; // グレー
}

function getTypeIcon(type){
  if((type||"").includes("駐車場")) return "P";
  return "⌂";
}

function createIcon(color,text){
  return L.divIcon({
    html:`<div style="
      width:34px;height:34px;
      border-radius:50%;
      background:${color};
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      border:2px solid white;
      font-size:14px;
    ">${text}</div>`,
    className:"",
    iconSize:[34,34],
    iconAnchor:[17,17]
  });
}

fetch(csvUrl)
.then(r=>r.text())
.then(text=>{
  const rows=text.split("\n").map(r=>r.split(","));
  const headers=rows[0];

  rows.slice(1).forEach(r=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=r[i]);

    const lat=parseFloat(obj["緯度"]);
    const lng=parseFloat(obj["経度"]);
    if(!lat||!lng)return;

    const name=obj["名称"]||"";
    const type=obj["種別"]||"";
    const status=obj["空き状況"]||"";
    const price=obj["月額"]||"";
    const shortPrice=obj["短期"]||"";

    const marker=L.marker([lat,lng],{
      icon:createIcon(getStatusColor(status),getTypeIcon(type))
    }).addTo(map);

    let html=`<b>${name}</b><br>`;
    if(status) html+=`状況：${status}<br>`;
    if(price) html+=`月額：¥${Number(price).toLocaleString()}<br>`;
    if(shortPrice) html+=`<span style="color:#000;font-weight:bold;">短期：¥${Number(shortPrice).toLocaleString()}</span><br>`;

    marker.bindPopup(html);
  });
});
</script>
</body>
</html>
